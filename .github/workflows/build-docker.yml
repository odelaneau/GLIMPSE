name: Build Docker image

on:
  push:
    branches:
      - release/*.*
      - master

  workflow_dispatch:
    inputs:
      build_arch:
        description: "Target architecture"
        default: znver2
        type: choice
        options:
          - skylake
          - znver2
        required: true

permissions:
  id-token: write # Required for assuming an AWS role
  contents: read # Required for actions/checkout

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PUBLIC_RELEASE: false
  AWS_REGION: us-east-1
  AWS_ROLE: arn:aws:iam::337532070941:role/github-actions-ecr
  GCP_WORKLOAD_IDENTITY_PROVIDER: projects/55428976747/locations/global/workloadIdentityPools/devops-pool/providers/devops-pool-provider
  GCP_SERVICE_ACCOUNT: gcr-push-sa@ultima-data-307918.iam.gserviceaccount.com
  GAR_REPO_INTERNAL: us-central1-docker.pkg.dev/ultima-data-307918/ultimagen
  GAR_REPO_SHARED: us-central1-docker.pkg.dev/ganymede-331016/ultimagen
  DOCKERHUB_ACCOUNT: ultimagenomics
  IMAGE: alignment

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Git Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: false
          fetch-depth: 0
          token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}

      - uses: benjlevesque/short-sha@v3.0
        id: short-sha
        with:
          length: 7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: false

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_ACCOUNT }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get version name
        run: |
          set -e

          echo "Get base version number from branch name"
          branch_name=${{ github.ref_name }}
          if [[ "${branch_name}" =~ ^release/[0-9]+\.[0-9]+ ]]; then
            echo "PUBLIC_RELEASE=true" >> ${GITHUB_ENV}
          fi
          # remove illegal characters for docker tag
          base_version=$(echo ${branch_name##release/} | sed 's/[^a-zA-Z0-9.]/-/g')
          echo "Base version is ${base_version}"

          echo "Get latest tag for ${base_version}"
          latest_version_tag=$(git for-each-ref --sort=-v:refname --format='%(refname:strip=2)' refs/tags/${base_version}.* | head -1)
          if [ -z "${latest_version_tag}" ]; then
            version="${base_version}.1"
          else
            version_bits=(${latest_version_tag//./ })
            new_patch=$((${version_bits[-1]} + 1))
            version_bits[-1]=${new_patch}
            version="$(echo ${version_bits[*]} | sed 's/ /./g')"
          fi
          echo "New version is ${version}"

          echo "Set build env variables"
          echo "BASE_VERSION=${base_version}" >> ${GITHUB_ENV}
          echo "VERSION=${version}" >> ${GITHUB_ENV}

      - name: Set build timestamp and image tags
        run: |
          set -e

          echo "BUILD_TIMESTAMP=$(date '+%F_%H:%M:%S')" >> ${GITHUB_ENV}

          image_tags=(
            ${{ env.VERSION }}
            ${{ steps.short-sha.outputs.sha }}
            ${{ env.BASE_VERSION }}
          )
          docker_registries=()
          gar_repo=${{ env.GAR_REPO_INTERNAL }}
          if [ ${{ env.PUBLIC_RELEASE }} == "true" ]; then
            docker_registries+=(${{ env.DOCKERHUB_ACCOUNT }})
            gar_repo=${{ env.GAR_REPO_SHARED }}
          fi
          docker_registries+=(
            ${{ steps.ecr-login.outputs.registry }}
            ${gar_repo}
          )

          for registry in ${docker_registries[@]}; do
            for tag in ${image_tags[@]}; do
              docker_destinations+=${registry}/${{ env.IMAGE }}:${tag},
            done
          done

          echo "GAR_REPO=${gar_repo}" >> ${GITHUB_ENV}
          echo "DOCKER_DESTINATIONS=${docker_destinations%,}" >> ${GITHUB_ENV}

      - name: Login to GAR
        id: gar-login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GAR_REPO }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: release
          file: ./docker/Dockerfile
          push: true
          build-args: |
            BUILD_ARCH=${{ inputs.build_arch || 'znver2' }}
            VERSION=${{ env.VERSION }}
            BUILD_TIMESTAMP=${{ env.BUILD_TIMESTAMP }}
            BUILD_VERSION=${{ steps.short-sha.outputs.sha }}
          tags: ${{ env.DOCKER_DESTINATIONS }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tag git repo
        uses: rickstaa/action-create-tag@v1
        with:
          tag: ${{ env.VERSION }}
          message: "Built by ${{ github.workflow_ref }} workflow. Job ID: ${{ github.job }}"

      # can move base version tag to point to the latest build of a branch/test version
      # see: https://github.com/actions/toolkit/blob/master/docs/action-versioning.md
      - name: Tag git repo with base version
        if: env.BASE_VERSION
        uses: rickstaa/action-create-tag@v1
        with:
          tag: "${{ env.BASE_VERSION }}-latest"
          force_push_tag: true
          message: "Built by ${{ github.workflow_ref }} workflow. Job ID: ${{ github.job }}"

      - name: Update action summary with built tags
        run: |
          echo "### ECR LOGIN" >> ${GITHUB_STEP_SUMMARY}
          echo "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ steps.ecr-login.outputs.registry }}" >> ${GITHUB_STEP_SUMMARY}
          echo "### IMAGE TAGS" >> ${GITHUB_STEP_SUMMARY}
          for dest in $(echo "${{ env.DOCKER_DESTINATIONS }}" | sed 's/,/ /g'); do 
            echo "- ${dest}" >> ${GITHUB_STEP_SUMMARY}
          done
